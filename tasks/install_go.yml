---
#  Install the exact Go version required by the cloned Sliver source's go.mod

- name: Install build dependencies
  apt:
    name:
      - git
      - build-essential
      - make
      - wget
    state: present
    update_cache: yes

- name: Read required Go version from go.mod
  shell: grep '^go ' /tmp/sliver-src/go.mod | awk '{print $2}'
  register: go_mod_version
  changed_when: false

- name: Set go_required_version fact
  set_fact:
    go_required_version: "{{ go_mod_version.stdout }}"

- name: Check currently installed Go version
  shell: /usr/local/go/bin/go version 2>/dev/null | grep -oP '(?<=go)[0-9]+\.[0-9]+(\.[0-9]+)?' || echo 'none'
  register: current_go_version
  changed_when: false
  failed_when: false

- name: Remove existing Go installation if version mismatch
  file:
    path: /usr/local/go
    state: absent
  when: current_go_version.stdout != go_required_version

- name: Download Go tarball
  get_url:
    url: "https://go.dev/dl/go{{ go_required_version }}.linux-amd64.tar.gz"
    dest: "/tmp/go{{ go_required_version }}.linux-amd64.tar.gz"
    mode: '0644'
  when: current_go_version.stdout != go_required_version

- name: Extract Go to /usr/local
  unarchive:
    src: "/tmp/go{{ go_required_version }}.linux-amd64.tar.gz"
    dest: /usr/local
    remote_src: yes
  when: current_go_version.stdout != go_required_version

- name: Create symlink for Go binary in /usr/local/bin
  file:
    src: /usr/local/go/bin/go
    dest: /usr/local/bin/go
    state: link
    force: yes
